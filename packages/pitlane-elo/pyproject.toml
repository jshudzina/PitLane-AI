[project]
name = "pitlane-elo"
version = "0.4.7"
description = "ELO rating models and story detection for F1"
readme = "README.md"
requires-python = ">=3.12,<3.15"
license = { text = "Apache-2.0" }
authors = [
    { name = "John Hudzina", email = "pitlaneagent@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
    "duckdb>=1.5.0",
    "matplotlib>=3.8",
    "numba>=0.60",
    "numpy>=1.24",
    "scipy>=1.10",
    "click>=8.1.0",
]

[project.optional-dependencies]
bayesian = [
    "pymc>=5.0",
    "arviz>=0.15",
]
notebooks = [
    "jupyter>=1.0",
    "pandas>=2.0",
]

[project.scripts]
pitlane-elo = "pitlane_elo.cli:main"

[project.urls]
Homepage = "https://github.com/jshudzina/PitLane-AI"
Repository = "https://github.com/jshudzina/PitLane-AI"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pitlane_elo"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
]
markers = [
    "slow: marks tests as slow running",
    "bayesian: marks tests that require PyMC and may be stochastic",
]

[dependency-groups]
dev = [
    "py-spy>=0.4.1",
    "pyinstrument>=5.1.2",
]
